# Shared defaults for every experiment. Each experiment config in this directory
# is deep-merged over this file by atlas.utils.config.load_config.
#
# YAML float gotcha: always write floats with a decimal point before the exponent
# (e.g. 2.0e-4, not 2e-4) — PyYAML parses the dot-less form as a *string*.

model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  # Pin to a commit SHA once confirmed, for reproducibility. null = latest.
  revision: null
  dtype: bfloat16

quant:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  double_quant: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

seed: 42

wandb:
  project: post-training-lab
  mode: online

# batch_size / backend / vllm are runtime-only knobs (speed, not what's measured) and
# are excluded from config_hash — see atlas.utils.config.compute_config_hash.
eval:
  batch_size: 16        # explicit batching is the main HF-backend speedup; vLLM ignores it
  backend: hf           # hf | vllm — Modal eval overrides to vllm
  vllm:                 # only used when backend == vllm
    gpu_memory_utilization: 0.6  # 0.5B weights are tiny; the rest is KV cache. 0.9 starved the
                                 # fp32 log_softmax(vocab) spike in lm-eval's loglikelihood
                                 # (prompt_logprobs) → CUDA OOM on a 22 GiB L4. 0.6 leaves headroom.
    max_model_len: null   # null = model default (32k); must fit 8-shot gsm8k prompt + gen
    tensor_parallel_size: 1
    data_parallel_size: 1
    max_lora_rank: 16     # must be >= lora.r
  tasks:
    mmlu:           {num_fewshot: 5, limit: 1000}
    gsm8k:          {num_fewshot: 8}
    truthfulqa_mc2: {num_fewshot: 0}
    ifeval:         {num_fewshot: 0}
