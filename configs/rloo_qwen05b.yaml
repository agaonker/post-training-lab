# Phase 3B: RLOO (REINFORCE Leave-One-Out) on Qwen2.5-0.5B.
#
# RLOO replaces PPO in our plan — TRL 1.4 deprecated PPOTrainer in favor of
# RLOO and GRPO. RLOO uses the trained Reward Model (Phase 3A) to score
# rollouts, with REINFORCE-style policy updates where multiple sibling
# completions (k=num_generations) act as each other's baseline.
#
# Policy = pretrained base + sft_v2 (merged in) + a fresh trainable LoRA.
# Reference = the same merged model with the new LoRA disabled (TRL handles
# this automatically via the peft_config path).
# Reward = base + rm_v1 adapter, loaded separately as a SequenceClassification
# model and passed via reward_funcs.
#
# YAML float gotcha: always write 5.0e-6, not 5e-6 (PyYAML parses the dot-less
# form as a string).

model:
  # Phase 3B policy base: Qwen's own -Instruct, not the pretrained base. Our
  # sft_v2 was under-trained on 5k UltraChat rows and didn't reliably emit
  # <|im_end|> at greedy temperature (see writeups & experiments/004) — so
  # 100% of RLOO rollouts hit max_completion_length. Bypassing sft_v2 in
  # favor of Qwen's known-good Instruct checkpoint unblocks Phase 3B at the
  # cost of comparison consistency: the methods table now has a footnote that
  # RLOO is measured from a different anchor than DPO. See experiments/005.
  name: Qwen/Qwen2.5-0.5B-Instruct
  # No tokenizer override — -Instruct ships the correct eos / chat_template
  # by default.
  tokenizer_name: null
  # No SFT adapter to merge — -Instruct *is* the SFT.
  sft_adapter: null
  sft_adapter_revision: null
  # Reward Model: stays on the pretrained base + rm_v1 adapter (the RM was
  # trained against pretrained Qwen2.5-0.5B, not -Instruct). The vocab is
  # byte-identical between the two so scoring works either way.
  rm_adapter: agaonker/atlas-rm-qwen05b-v1
  rm_adapter_revision: null
  rm_base: Qwen/Qwen2.5-0.5B

quant:
  # Disable 4-bit for the same reason DPO does: merge_and_unload needs
  # full-precision weights. The reward model is loaded separately and stays
  # in 4-bit for memory (see src/atlas/train/rloo.py).
  load_in_4bit: false

dataset:
  name: HuggingFaceH4/ultrafeedback_binarized
  split: train_prefs
  revision: null
  # 5k prompts matches sft_v2 / dpo_v1 / rm_v1 row counts. RLOO only consumes
  # the prompts (not chosen/rejected) — see load_ultrafeedback_prompts.
  n_samples: 5000

train:
  output_dir: outputs/rloo_qwen05b_v1
  # Similar order to DPO (steep loss surface — RL gradients are high-variance).
  learning_rate: 5.0e-6
  num_train_epochs: 1
  # RLOO samples num_generations completions per prompt and uses each as the
  # others' baseline. 4 is the standard k for REINFORCE-leave-one-out.
  num_generations: 4
  # Smaller per-device batch because every step has k=4 rollouts to score
  # through the policy + ref + reward. Effective batch matches sft_v2/dpo_v1.
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  # KL coefficient — lower than DPO's β=0.1 because RLOO already constrains
  # via clipping. 0.05 is HF alignment-handbook's recommendation.
  beta: 0.05
  # PPO-style clip range, applied to the importance-sampling ratio.
  epsilon: 0.2
  # Sampling temperature for rollouts. 0.7 trades off exploration vs sample
  # quality; the RM scores the resulting completions.
  temperature: 0.7
  # Mask truncated rollouts so the RM can't reward partial content. With
  # the policy now anchored to -Instruct (which terminates reliably), this
  # should be the principled choice. Earlier we set it to false to work
  # around sft_v2's weak eos behavior; that workaround is no longer needed.
  mask_truncated_completions: true
  # Clip reward magnitudes to keep gradients bounded. RLOO expects a [min, max]
  # pair, not a scalar. The RM produced rewards in the 6-12 range during
  # training; ±15 covers that with headroom for drift during RL.
  reward_clip_range: [-15.0, 15.0]
  warmup_ratio: 0.03
  gradient_checkpointing: true
  logging_steps: 10
  save_strategy: "no"
  report_to: wandb
  # Cap rollout (completion) length. RLOO rollouts are completions only —
  # the prompt is the fixed context — so this is the generated-tokens cap,
  # not the combined sequence cap (DPO uses max_length for combined; RLOO
  # uses max_completion_length for the generated portion).
  max_completion_length: 512

output:
  hub_repo: agaonker/atlas-rloo-qwen05b-v1
