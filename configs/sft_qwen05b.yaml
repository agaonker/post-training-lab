# Phase 1: SFT on pretrained Qwen2.5-0.5B with QLoRA on UltraChat-200k.
#
# Inherits model / lora / quant / eval / seed from base.yaml; only adds the
# Phase-1-specific blocks (dataset / train / output). cfg.train is a deliberate
# passthrough — every key here flows verbatim to TRL's SFTConfig, so survival
# of TRL version bumps is one YAML edit, not a code change.
#
# YAML float gotcha: always write 2.0e-4, not 2e-4 (PyYAML parses the dot-less
# form as a string).

model:
  # Load the tokenizer from the Instruct variant (same byte-identical vocab as
  # the base, but with correct eos = <|im_end|> and a chat_template that ships
  # {% generation %} markers — required for assistant_only_loss below).
  # The base/model weights still come from cfg.model.name in base.yaml.
  tokenizer_name: Qwen/Qwen2.5-0.5B-Instruct

dataset:
  name: HuggingFaceH4/ultrachat_200k
  split: train_sft
  # Pin once a run is locked in to avoid silent upstream drift. null = latest.
  revision: null
  # 5k is the Phase 1 starting point per PROJECT.md §4.1 — small enough to
  # iterate, large enough for SFT to actually move IFEval.
  n_samples: 5000

train:
  # Run-scoped output dir — never the default outputs/run, which would collide
  # with parallel experiments (the P2 footgun documented in TODOS.md).
  output_dir: outputs/sft_qwen05b_v1
  # QLoRA-standard lr; the LoRA rank=16 setup tolerates more aggressive lr
  # than full fine-tuning would.
  learning_rate: 2.0e-4
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4  # effective batch = 16
  # Mask user/system turns out of the loss. TRL 1.4 defaults this to False; in
  # sft_v1 the loss was computed over the whole rendered conversation, so a
  # large share of the gradient was teaching the 0.5B to generate user turns
  # — visible as a small uniform regression across every eval. Requires the
  # tokenizer's chat_template to ship {% generation %} markers (Instruct does,
  # base does not — see model.tokenizer_name above).
  assistant_only_loss: true
  warmup_ratio: 0.03
  # Required on T4 to fit a 0.5B + 4-bit + LoRA + batch=4 inside 16GB.
  gradient_checkpointing: true
  logging_steps: 10
  # Single save at end via trainer.save_model — no mid-run checkpoints for a
  # ~1-epoch / ~80-step run.
  save_strategy: "no"
  report_to: wandb

output:
  # Adapter destination on HF Hub. Update to your namespace; the train script
  # only pushes if this is set and --no-push-to-hub isn't passed.
  # v1 was on -Instruct (kept on Hub as historical); v2 is the run on pretrained
  # Qwen2.5-0.5B with assistant_only_loss + patched chat_template.
  hub_repo: agaonker/atlas-sft-qwen05b-v2
